<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Automated testing dashboard workspace</title>
  <desc id="desc">A dark QA automation command centre with test result panels, CI pipeline checks, API logs and a laptop dashboard.</desc>
  <defs>
